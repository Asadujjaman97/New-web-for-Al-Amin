<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Product Data Sheet | Carbolabs Corporation</title>
<link rel="stylesheet" href="./style.css">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
</style>
</head>

<body class="bg-gray-100">

<div class="max-w-xl mx-auto mt-10 bg-white p-8 rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center mb-4 text-gray-800">Request Technical Data Sheet</h2>

    <!-- Form -->
   <form class="dataSheetForm space-y-6" action="send_mail_datasheet.php" method="POST">
    <input type="text" name="name" required placeholder="Your Name">
    <input type="email" name="email" required placeholder="Your Email">
    <input type="tel" name="mobile" required placeholder="Mobile Number">
    <input type="text" name="company" placeholder="Company Name">
    <textarea name="message" placeholder="Message (optional)"></textarea>
    <input type="hidden" name="pdf" value="pdfs/soda ash.pdf">

    <button type="submit">Submit & Open Data Sheet</button>
</form>

</div>

<!-- JS -->
<script>
document.querySelectorAll(".dataSheetForm").forEach(form => {
    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const formData = new FormData(form);

        // Force include phone
        const phoneInput = form.querySelector('input[name="phone"]');
        if (phoneInput) formData.set('phone', phoneInput.value.trim());

        // Force include PDF
        const pdfInput = form.querySelector('input[name="pdf"]');
        if (pdfInput) formData.set('pdf', pdfInput.value);
        if (pdfInput) window.open(pdfInput.value, "_blank");

        fetch(form.action, { method: "POST", body: formData })
            .then(res => res.text())
            .then(res => {
                console.log("PHP Response:", res);
                if (res.trim() !== "OK") alert("Mail sending failed");
                else form.reset();
            })
            .catch(err => {
                console.error(err);
                alert("Network error");
            });
    });
});


</script>


</body>
</html>
